name: Publish
on:
  release:
    types: [released, prereleased]

jobs:
  verify:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run tests and build artifacts
        run: ./gradlew build

  publish:
    name: Release build and publish
    needs: verify
    runs-on: macOS-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21
      - name: Resolve and verify version from release tag
        # strip leading "v" if present and compare to the version set in the project files
        id: ver
        run: |
          tag="${{ github.event.release.tag_name }}"
          tag_version="${tag#v}" 
          file_version=$(grep '^version=' gradle.properties | cut -d= -f2)
          if [ "$tag_version" != "$file_version" ]; then
            echo "::error::Tag version ($tag_version) does not match gradle.properties version ($file_version). Bump gradle.properties before tagging."
            exit 1
          fi
          echo "version=$tag_version" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $tag_version"
      - name: Publish to MavenCentral
        run: ./gradlew -Pversion=${{ steps.ver.outputs.version }} publishToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
